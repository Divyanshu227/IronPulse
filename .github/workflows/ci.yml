name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  frontend:
    name: Frontend: lint & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        working-directory: frontend
        run: |
          npm ci
      - name: Lint
        working-directory: frontend
        run: |
          npm run lint
      - name: Build
        working-directory: frontend
        run: |
          npm run build

  backend:
    name: Backend: install & smoke-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install backend deps
        working-directory: backend
        run: |
          npm ci
      - name: Syntax check server
        working-directory: backend
        run: |
          node --check server.js
